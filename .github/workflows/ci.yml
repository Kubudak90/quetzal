# CI Pipeline for ZSwap-on-Aztec
#
# Three jobs:
#   noir        - compile Noir contracts + run TXE (oracle) tests inside Docker
#   typescript  - typecheck (runs in parallel with `noir`)
#   integration - spin up full dev stack and run Node:test integration suite
#
# NOTE ON FLAKINESS: The `integration` job starts the Aztec local-network as a
# background process and polls http://localhost:8080 for readiness.  Aztec 4.x
# local-network startup is non-deterministic and can take 60-180 s in CI; the
# poll loop allows up to 3 min (90 x 2 s).  If the stack does not come up in
# time, the tests will fail with connection-refused errors rather than a
# meaningful assertion failure.  This is a known limitation of running a
# multi-container L1+L2 stack inside a GitHub-hosted runner -- do NOT paper
# over it with blind retries.  If it becomes consistently flaky, consider
# extracting integration tests to a self-hosted runner or using `concurrency`
# + retry at the workflow level.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Noir -- compile contracts + TXE tests (all via Docker bypass)
  # ---------------------------------------------------------------------------
  noir:
    name: Noir compile + TXE tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Aztec Docker image
        run: docker pull aztecprotocol/aztec:4.2.1

      - name: Compile contracts
        run: bash scripts/compile-all.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Noir / TXE tests
        run: pnpm test:noir

  # ---------------------------------------------------------------------------
  # Job 2: TypeScript -- typecheck (independent, runs in parallel with `noir`)
  # ---------------------------------------------------------------------------
  typescript:
    name: TypeScript typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        # tests/integration/generated/ is gitignored and only produced by
        # codegen at runtime.  The tsconfig for that package excludes the
        # `generated` directory so tsc will not complain about missing files.
        run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # Job 3: Integration -- full dev-stack tests (needs compiled artifacts)
  # ---------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Artifacts are compiled fresh below; we still gate on `noir` to avoid
    # running the expensive dev-stack when compile/TXE already failed.
    needs: [noir]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Foundry (anvil)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Aztec Docker image
        run: docker pull aztecprotocol/aztec:4.2.1

      - name: Compile contracts
        run: bash scripts/compile-all.sh

      - name: Generate TypeScript bindings (codegen)
        run: |
          VERSION=4.2.1
          mkdir -p tests/integration/generated
          docker run --rm \
            -v "$PWD:/work" -w /work \
            "aztecprotocol/aztec:$VERSION" \
            bash -c "node --no-warnings /usr/src/yarn-project/aztec/dest/bin/index.js codegen contracts/token-a/target -o tests/integration/generated"
          docker run --rm \
            -v "$PWD:/work" -w /work \
            "aztecprotocol/aztec:$VERSION" \
            bash -c "node --no-warnings /usr/src/yarn-project/aztec/dest/bin/index.js codegen contracts/token-b/target -o tests/integration/generated"

      - name: Start dev stack (background)
        run: |
          nohup bash scripts/dev.sh > /tmp/dev.log 2>&1 &
          echo $! > /tmp/dev.pid
          echo "Dev stack PID: $(cat /tmp/dev.pid)"

      - name: Wait for Aztec local-network to be ready
        # Polls http://localhost:8080 -- the Aztec node returns 405 or 200 once
        # it is accepting JSON-RPC.  Timeout: 90 x 2 s = 3 min.
        # NOTE: If this step times out the L2 node did not come up in time.
        # This is the most likely source of flakiness.  See top-level comment.
        run: |
          echo "Waiting for Aztec local-network on :8080 ..."
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || true)
            if [ "$code" = "405" ] || [ "$code" = "200" ]; then
              echo "Aztec node ready (HTTP $code) after $((i * 2)) s"
              break
            fi
            if [ "$i" = "90" ]; then
              echo "TIMEOUT: Aztec node did not come up within 3 minutes."
              echo "--- dev.log tail ---"
              tail -80 /tmp/dev.log || true
              exit 1
            fi
            sleep 2
          done

      - name: Run integration tests
        run: pnpm test

      - name: Stop dev stack
        if: always()
        run: bash scripts/dev.sh --down
