name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on PR force-push or merge into main
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: Typecheck + unit tests + frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match the packageManager field in package.json
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        # Mirror Vercel's command — non-frozen lockfile, in case pnpm-lock.yaml drifts.
        # If you want strict reproducibility on CI, switch to --frozen-lockfile.
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck — @quetzal/sdk
        run: pnpm -F @quetzal/sdk typecheck

      - name: Typecheck — @quetzal/cli
        run: pnpm -F @quetzal/cli typecheck

      - name: Typecheck — @quetzal/frontend
        run: pnpm -F @quetzal/frontend typecheck

      - name: Unit tests — @quetzal/sdk (node:test)
        run: pnpm -F @quetzal/sdk test

      - name: Unit tests — @quetzal/cli (node:test)
        run: pnpm -F @quetzal/cli test

      - name: Build — @quetzal/frontend (Vite + Node polyfills + SDK browser shims)
        run: pnpm -F @quetzal/frontend build

      # Skipped on purpose (would slow PRs from <2min to >15min):
      #   - L1 Foundry tests (needs forge install + Solidity toolchain)
      #   - L2 Noir TXE tests (needs Docker + nargo via aztec-up)
      #   - Integration tests under tests/ (needs deployed contracts on Aztec sandbox)
      #   - Aggregator package (depends on local Postgres + Aztec stack)
      # If you want these gated, add a separate "weekly" workflow that runs on cron.
