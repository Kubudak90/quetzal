global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: zswap-l1
    static_configs:
      - targets: ["l1-exporter:9100"]
  - job_name: zswap-l2
    static_configs:
      - targets: ["l2-exporter:9101"]
